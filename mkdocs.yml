site_name: EGR 314 Christo's Data Sheet 
site_url: https://chvisto.github.io
repo_url: https://github.com/chvisto/chvisto.github.io
edit_uri: edit/main/docs/
theme:
  name: material
  custom_dir: custom_theme/
  palette:
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  logo: static/logo314.svg
  favicon: static/logo-314.png
  icon:
    repo: fontawesome/brands/github

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - toc.follow
    - navigation.top
    - navigation.path
    - navigation.indexes
    - navigation.prune
    - content.action.edit
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - announce.dismiss

markdown_extensions:
  - attr_list #add attributes using curly brackets to images, see https://squidfunk.github.io/mkdocs-material/reference/images/
  - md_in_html # see https://squidfunk.github.io/mkdocs-material/reference/images/
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tilde: {}
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

draft_docs: |
  **/*_unpublished.md
  **/*_draft.md
  **/*_draft**
  
plugins:
  - search
  - glightbox # allow resize images, see https://squidfunk.github.io/mkdocs-material/reference/images/

extra_css:
  - stylesheets/extra.css  

extra_javascript:
 - javascripts/mathjax.js
 - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
    
nav:
  - Home: index.md
  - Requirements: 01-Requirements/Requirements.md
  - Block Diagram: 02-Block-Diagram/Block-Diagram.md
  - Component Selection:
    - Microcontroller: 03-Component-Selection/Microcontroller/Microcontroller.md
    - Major Components: 03-Component-Selection/Major-Components/Major-Components.md
    - Power Budget: 03-Component-Selection/Power-Budget/Power-Budget.md
  - BOM: 04-BOM/BOM.md
  - Schematic: 05-Schematic/schematic.md
  - PCB: 06-PCB/PCB.md
  - Subsystem API: 07-API/api.md
  - Resources: 08-Resources/resources.md

not_in_nav: |
  static
  
copyright: "Copyright &copy; 2026 ProjectX"

extra:
  generator: false
  social:
    - icon: fontawesome/regular/file-code
      link: /2026_spring
      name: 2023 Site    
